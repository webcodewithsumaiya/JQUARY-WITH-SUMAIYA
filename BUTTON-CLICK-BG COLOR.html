<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        p{
            padding: 15px;
           text-align: center;
        }
        .p1 {
            background-color: pink;
        }

        .p2 {
            background-color: red;
        }
        .p3 {
            background-color: yellow;
        }
        .p4 {
            background-color: green;
        }
    </style>
    <script>
        $(document).ready(function(){
            $("button").click(function(){
                $(".p1").css({"background-color":"aqua","font-size":"35px"});
                $(".p2").css({"background-color":"aqua","font-size":"35px"});
                $(".p3").css({"background-color":"aqua","font-size":"35px"});
                $(".p4").css({"background-color":"aqua","font-size":"35px"});
               
            });
        });
    </script>
</head>

<body>
    <button>Click</button>
    <p class="p1">Lorem ipsum dolor sit.</p>
    <p class="p2">Lorem ipsum dolor sit.</p>
    <p class="p3">Lorem ipsum dolor sit.</p>
    <p class="p4">Lorem ipsum dolor sit.</p>
</body>

</html>
